version: '3.8'

services:
  backend:
    image: licitia-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    deploy:
      restart_policy:
        condition: on-failure
    networks:
      - app-network

  frontend:
    image: licitia-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://licitia.allanturing.com/api
    ports:
      - "3000:3000"
    deploy:
      restart_policy:
        condition: on-failure
    networks:
      - app-network

networks:
  app-network:
    driver: overlay