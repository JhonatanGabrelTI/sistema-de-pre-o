version: '3.8'

services:
  backend:
    image: licitia-backend:latest
    ports:
      - "8000:8000"
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.licitia-backend.rule=Host(`licitia.allanturing.com`) && PathPrefix(`/api`)"
        - "traefik.http.services.licitia-backend.loadbalancer.server.port=8000"
        - "traefik.http.routers.licitia-backend.entrypoints=web"
        - "traefik.http.routers.licitia-backend.tls=false"
    networks:
      - app-network

  frontend:
    image: licitia-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://licitia.allanturing.com/api
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.licitia-frontend.rule=Host(`licitia.allanturing.com`)"
        - "traefik.http.services.licitia-frontend.loadbalancer.server.port=3000"
        - "traefik.http.routers.licitia-frontend.entrypoints=web"
        - "traefik.http.routers.licitia-frontend.tls=false"
    networks:
      - app-network

networks:
  app-network:
    driver: overlay
